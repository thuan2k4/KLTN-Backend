services:
  - type: web
    name: skinscan-backend
    runtime: python
    plan: free
    region: singapore
    rootDir: .
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: APP_NAME
        value: SkinScan API
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api
      - key: USE_MOCK_INFERENCE
        value: "false"
      - key: DEFAULT_MODEL
        value: b3
      - key: MODEL_WEIGHTS_DIR
        value: weights
      - key: MODEL_DEVICE
        value: cpu
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: HF_SPACE_ID
        value: qthuan2604/skin-disease-classifier
      - key: FRONTEND_ORIGINS
        value: https://hue-ict-skin-scan.netlify.app
